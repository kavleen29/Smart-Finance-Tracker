<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - FinTrack</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f0f0f; color: #f0f0f0;
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .box { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 16px; padding: 36px; width: 380px; max-width: 90vw; }
        .logo { font-size: 22px; font-weight: 600; text-align: center; margin-bottom: 6px; }
        .subtitle { font-size: 13px; color: #999; text-align: center; margin-bottom: 28px; }
        .form-group { margin-bottom: 16px; }
        label { font-size: 12px; color: #aaa; margin-bottom: 6px; display: block; }
        input { width: 100%; padding: 11px 14px; border: 1px solid #2a2a2a; border-radius: 8px; background: #0f0f0f; color: #f0f0f0; font-size: 14px; }
        input:focus { outline: none; border-color: #64a0d4; }
        .btn { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #f0f0f0; color: #0f0f0f; font-size: 14px; font-weight: 500; cursor: pointer; margin-top: 8px; }
        .btn:hover { opacity: 0.9; }
        .flash { background: #2a1414; color: #e57373; padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; }
        .switch { text-align: center; margin-top: 20px; font-size: 13px; color: #999; }
        .switch a { color: #64a0d4; text-decoration: none; }
        .hint { font-size: 11px; color: #666; margin-top: 4px; }
    </style>
</head>
<body>
    <div class="box">
        <div class="logo">💰 FinTrack</div>
        <div class="subtitle">Create your account</div>

        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="flash">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required autofocus minlength="3">
                <div class="hint">At least 3 characters</div>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required minlength="4">
                <div class="hint">At least 4 characters</div>
            </div>
            <button type="submit" class="btn">Sign Up</button>
        </form>
        <div class="switch">Already have an account? <a href="/login">Log in</a></div>
    </div>
</body>
</html>
